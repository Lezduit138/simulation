<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OS Scheduling Simulations</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      padding: 40px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      width: 320px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    p {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-fcfs {
      background: #4facfe;
      color: white;
    }

    .btn-sjf {
      background: #43e97b;
      color: black;
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>OS Scheduling Simulations</h1>
    <p>Select an algorithm to explore</p>

    <a href="fcfs.html">
      <button class="btn btn-fcfs">FCFS Scheduling</button>
    </a>

    <a href="sjf.html">
      <button class="btn btn-sjf">SJF Scheduling</button>
    </a>
  </div>
</body>
</html>
